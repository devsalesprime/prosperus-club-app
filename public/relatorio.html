<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório de Progresso — Prosperus Club</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #031A2B;
      color: #e2e8f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #031A2B;
      border-bottom: 1px solid #1e3a4a;
      flex-shrink: 0;
      gap: 12px;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-brand img {
      height: 28px;
      width: auto;
    }
    .header-title {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .header-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 99px;
      background: rgba(255, 218, 113, 0.1);
      color: #FFDA71;
      border: 1px solid rgba(255, 218, 113, 0.2);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── States ── */
    .state-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      text-align: center;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1e3a4a;
      border-top-color: #FFDA71;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-title { font-size: 16px; font-weight: 600; color: #e2e8f0; }
    .state-sub { font-size: 13px; color: #64748b; max-width: 320px; line-height: 1.5; }
    .error-icon { font-size: 40px; }

    /* ── Iframe ── */
    #report-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: none;
      background: #fff;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-brand">
      <img
        src="https://salesprime.com.br/wp-content/uploads/2025/11/logo-prosperus.svg"
        alt="Prosperus Club"
        onerror="this.style.display='none'"
      />
      <span class="header-title" id="report-title">Carregando relatório...</span>
    </div>
    <span class="header-badge">📊 Relatório de Progresso</span>
  </div>

  <div class="state-container" id="loading-state">
    <div class="spinner"></div>
    <p class="state-title">Carregando relatório</p>
    <p class="state-sub">Aguarde enquanto buscamos seu relatório de forma segura.</p>
  </div>

  <div class="state-container" id="error-state" style="display:none">
    <span class="error-icon">⚠️</span>
    <p class="state-title" id="error-title">Não foi possível carregar o relatório</p>
    <p class="state-sub" id="error-sub">O link pode ter expirado. Solicite um novo link ao administrador do Prosperus Club.</p>
  </div>

  <iframe id="report-frame" title="Relatório de Progresso"></iframe>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const signedUrl = params.get('url');
      const titleParam = params.get('title');

      if (titleParam) {
        document.getElementById('report-title').textContent = decodeURIComponent(titleParam);
        document.title = decodeURIComponent(titleParam) + ' — Prosperus Club';
      }

      if (!signedUrl) {
        showError('Link inválido', 'Nenhuma URL de relatório foi fornecida.');
        return;
      }

      try {
        const response = await fetch(decodeURIComponent(signedUrl));

        if (!response.ok) {
          if (response.status === 400 || response.status === 401) {
            showError('Link expirado', 'Este link de relatório expirou. Solicite um novo link ao administrador.');
          } else {
            showError('Erro ao carregar', `Código de erro: ${response.status}. Tente novamente.`);
          }
          return;
        }

        const html = await response.text();

        // Atualiza o título com base no <title> do HTML do relatório
        const titleMatch = html.match(/<title[^>]*>(.*?)<\/title>/i);
        if (titleMatch && titleMatch[1] && !titleParam) {
          document.getElementById('report-title').textContent = titleMatch[1];
          document.title = titleMatch[1] + ' — Prosperus Club';
        }

        // Renderiza via Blob URL (garante renderização correta independente do CDN)
        const blob = new Blob([html], { type: 'text/html; charset=utf-8' });
        const blobUrl = URL.createObjectURL(blob);

        const frame = document.getElementById('report-frame');
        frame.onload = () => {
          document.getElementById('loading-state').style.display = 'none';
          frame.style.display = 'block';
          URL.revokeObjectURL(blobUrl); // libera memória
        };
        frame.src = blobUrl;

      } catch (err) {
        console.error('Failed to load report:', err);
        showError('Falha na conexão', 'Não foi possível buscar o relatório. Verifique sua conexão e tente novamente.');
      }
    })();

    function showError(title, sub) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('error-title').textContent = title;
      document.getElementById('error-sub').textContent = sub;
      document.getElementById('error-state').style.display = 'flex';
    }
  </script>

</body>
</html>
