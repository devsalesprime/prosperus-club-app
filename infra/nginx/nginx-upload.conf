# ============================================
# NGINX CONFIG — File Upload + Static Serving
# ============================================
# Adicione ao server block de prosperusclub.com.br
# ANTES do "location /api/" genérico
# Depois: sudo nginx -t && sudo systemctl reload nginx

# 1. Upload endpoint (Node.js na porta 3010)
# Intercepta /api/upload ANTES do /api/ genérico (porta 3005)
location = /api/upload {
    proxy_pass http://127.0.0.1:3010/api/upload;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 12M;
    proxy_read_timeout 60;
}

# 2. Servir arquivos estáticos de /var/www/pdf/
location /pdf/ {
    alias /var/www/pdf/;
    autoindex off;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header Access-Control-Allow-Origin "*";

    # Security: prevent execution
    location ~ \.php$ {
        deny all;
    }
}
